<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - CampusMarket DUT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
:root {
  --primary: #6366f1;
  --accent: #06d6a0;
  --danger: #ef476f;
  --warning: #f59e0b;
  --bg-dark: #0f172a;
  --bg-card: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --border: #334155;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  line-height: 1.6;
  padding: 20px;
}

.login-container {
  max-width: 400px;
  margin: 100px auto;
  background: var(--bg-card);
  padding: 40px;
  border-radius: 16px;
  border: 1px solid var(--border);
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.login-header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--text-secondary);
  font-weight: 600;
}

.form-group input {
  width: 100%;
  padding: 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 1rem;
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent);
}

.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-login:hover {
  transform: translateY(-2px);
}

.dashboard {
  display: none;
  max-width: 1400px;
  margin: 0 auto;
}

.dashboard.active {
  display: block;
}

.admin-header {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.admin-title h1 {
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.realtime-status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 12px;
  background: var(--bg-dark);
  border-radius: 8px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

.status-dot.disconnected {
  background: var(--danger);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.stat-value {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.filters {
  background: var(--bg-card);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  border: 1px solid var(--border);
}

.filter-btn {
  padding: 8px 16px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg-dark);
  font-weight: 600;
}

.listings-container {
  display: grid;
  gap: 16px;
}

.listing-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 20px;
  align-items: start;
  animation: fadeIn 0.3s ease;
}

.listing-card.new {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(6, 214, 160, 0.3);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.listing-image {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  background: rgba(99,102,241,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  overflow: hidden;
}

.listing-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.listing-info h3 {
  margin-bottom: 8px;
  font-size: 1.1rem;
}

.listing-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.listing-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.status-pending {
  background: rgba(245, 158, 11, 0.2);
  color: var(--warning);
}

.status-active {
  background: rgba(6, 214, 160, 0.2);
  color: var(--accent);
}

.status-sold {
  background: rgba(148, 163, 184, 0.2);
  color: var(--text-secondary);
}

.listing-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-action {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.85rem;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.btn-approve {
  background: var(--accent);
  color: var(--bg-dark);
}

.btn-approve:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(6, 214, 160, 0.3);
}

.btn-sold {
  background: rgba(148, 163, 184, 0.2);
  color: var(--text-primary);
}

.btn-delete {
  background: rgba(239, 71, 111, 0.2);
  color: var(--danger);
}

.btn-view {
  background: var(--bg-dark);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 16px 24px;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  z-index: 10000;
  animation: slideIn 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  gap: 12px;
}

.notification.success {
  background: var(--accent);
  color: var(--bg-dark);
}

.notification.warning {
  background: var(--warning);
  color: var(--bg-dark);
}

.notification.info {
  background: var(--primary);
}

@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

@media (max-width: 768px) {
  .listing-card {
    grid-template-columns: 1fr;
  }
  
  .listing-actions {
    flex-direction: row;
    flex-wrap: wrap;
  }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="loginContainer">
  <div class="login-header">
    <h1>🛡️ Admin Panel</h1>
    <p style="color: var(--text-secondary);">CampusMarket DUT</p>
  </div>
  <form id="loginForm">
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" required>
    </div>
    <button type="submit" class="btn-login">Login</button>
  </form>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  
  <!-- Header -->
  <div class="admin-header">
    <div class="admin-title">
      <h1>📊 Admin Dashboard</h1>
      <p style="color: var(--text-secondary); font-size: 0.9rem;">Realtime Mode - Listings appear instantly</p>
    </div>
    <div class="realtime-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting to realtime...</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="pendingCount">0</div>
      <div class="stat-label">⏳ Pending Review</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="activeCount">0</div>
      <div class="stat-label">✅ Active Listings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="soldCount">0</div>
      <div class="stat-label">💰 Sold Items</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">📦 Total Listings</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterListings('all')">All Listings</button>
    <button class="filter-btn" onclick="filterListings('pending')">⏳ Pending</button>
    <button class="filter-btn" onclick="filterListings('active')">✅ Active</button>
    <button class="filter-btn" onclick="filterListings('sold')">💰 Sold</button>
  </div>

  <!-- Listings -->
  <div class="listings-container" id="listingsContainer">
    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
      <i data-lucide="loader" style="animation: spin 1s linear infinite; font-size: 48px;"></i>
      <p style="margin-top: 16px;">Loading listings...</p>
    </div>
  </div>

</div>

<script>
lucide.createIcons();

// ===== CONFIG =====
const ADMIN_PASSWORD = '22490622CM_adminsOnly!'; // CHANGE THIS!
let currentFilter = 'all';

// ===== REALTIME ADMIN PANEL CLASS =====
class RealtimeAdminPanel {
  constructor() {
    this.listings = [];
    this.channel = null;
    this.isConnected = false;
    this.init();
  }

  async init() {
    console.log('🚀 Starting Realtime Admin Panel...');
    
    // Load initial listings
    await this.fetchListings();
    
    // Start realtime subscription
    this.subscribeToListings();
  }

  async fetchListings() {
    try {
      console.log('📡 Fetching listings from Supabase...');
      
      const { data, error } = await supabaseClient
        .from('listings')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (error) throw error;
      
      this.listings = data || [];
      console.log(`✅ Loaded ${this.listings.length} listings`);
      
      this.updateStats();
      this.displayListings();
      
    } catch (error) {
      console.error('❌ Error fetching listings:', error);
      this.showNotification('Failed to load listings', 'warning');
    }
  }

  subscribeToListings() {
    console.log('👂 Setting up realtime subscription...');
    
    // Remove existing subscription if any
    if (this.channel) {
      supabaseClient.removeChannel(this.channel);
    }

    // Create realtime channel
    this.channel = supabaseClient
      .channel('listings-changes')
      .on(
        'postgres_changes',
        { 
          event: '*', // Listen to ALL events (INSERT, UPDATE, DELETE)
          schema: 'public', 
          table: 'listings' 
        },
        (payload) => {
          console.log('🔔 Realtime event received:', payload);
          this.handleRealtimeUpdate(payload);
        }
      )
      .subscribe((status) => {
        console.log('📡 Subscription status:', status);
        this.updateConnectionStatus(status);
        
        if (status === 'CLOSED') {
          console.log('⚠️ Connection closed, attempting reconnect...');
          setTimeout(() => this.subscribeToListings(), 3000);
        }
      });
  }

  updateConnectionStatus(status) {
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    if (status === 'SUBSCRIBED') {
      this.isConnected = true;
      statusDot.classList.remove('disconnected');
      statusText.textContent = '✅ Connected - Listening for new listings';
    } else if (status === 'CLOSED') {
      this.isConnected = false;
      statusDot.classList.add('disconnected');
      statusText.textContent = '❌ Disconnected - Reconnecting...';
    } else {
      statusText.textContent = `⏳ ${status}...`;
    }
  }

  handleRealtimeUpdate(payload) {
    switch (payload.eventType) {
      case 'INSERT':
        console.log('➕ New listing created:', payload.new);
        this.handleNewListing(payload.new);
        break;
        
      case 'UPDATE':
        console.log('✏️ Listing updated:', payload.new);
        this.handleUpdatedListing(payload.new);
        break;
        
      case 'DELETE':
        console.log('🗑️ Listing deleted:', payload.old);
        this.handleDeletedListing(payload.old);
        break;
    }
  }

  handleNewListing(newListing) {
    // Add to beginning of array
    this.listings.unshift(newListing);
    
    // Update UI
    this.updateStats();
    this.displayListings();
    
    // Show notification
    this.showNotification(`🆕 New listing: "${newListing.title}"`, 'success');
    
    // Play sound
    this.playNotificationSound();
    
    // Update page title
    document.title = `(${this.getPendingCount()}) Admin Panel`;
  }

  handleUpdatedListing(updatedListing) {
    const index = this.listings.findIndex(l => l.id === updatedListing.id);
    
    if (index !== -1) {
      this.listings[index] = updatedListing;
      this.updateStats();
      this.displayListings();
      this.showNotification(`✏️ Listing updated: "${updatedListing.title}"`, 'info');
    }
  }

  handleDeletedListing(deletedListing) {
    this.listings = this.listings.filter(l => l.id !== deletedListing.id);
    this.updateStats();
    this.displayListings();
    this.showNotification(`🗑️ Listing deleted`, 'warning');
  }

  getPendingCount() {
    return this.listings.filter(l => l.status === 'pending').length;
  }

  updateStats() {
    const pending = this.listings.filter(l => l.status === 'pending').length;
    const active = this.listings.filter(l => l.status === 'active').length;
    const sold = this.listings.filter(l => l.status === 'sold').length;
    
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('activeCount').textContent = active;
    document.getElementById('soldCount').textContent = sold;
    document.getElementById('totalCount').textContent = this.listings.length;
    
    // Update page title with pending count
    document.title = pending > 0 ? `(${pending}) Admin Panel` : 'Admin Panel';
  }

  displayListings() {
    const container = document.getElementById('listingsContainer');
    
    let filtered = this.listings;
    if (currentFilter !== 'all') {
      filtered = this.listings.filter(l => l.status === currentFilter);
    }
    
    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i data-lucide="inbox" style="font-size: 64px; opacity: 0.3;"></i>
          <h3 style="margin-top: 16px;">No ${currentFilter === 'all' ? '' : currentFilter} listings</h3>
        </div>
      `;
      lucide.createIcons();
      return;
    }
    
    container.innerHTML = filtered.map(listing => {
      const statusClass = `status-${listing.status}`;
      const statusText = listing.status.charAt(0).toUpperCase() + listing.status.slice(1);
      
      const imageHTML = listing.images && listing.images.length > 0
        ? `<img src="${listing.images[0]}" alt="${listing.title}">`
        : (listing.emoji || '📦');
      
      // Check if listing is less than 5 minutes old
      const isNew = (Date.now() - new Date(listing.created_at).getTime()) < 300000;
      
      return `
        <div class="listing-card ${isNew ? 'new' : ''}" data-id="${listing.id}">
          <div class="listing-image">${imageHTML}</div>
          
          <div class="listing-info">
            <span class="status-badge ${statusClass}">${statusText}</span>
            ${isNew ? '<span class="status-badge" style="background: var(--accent); color: var(--bg-dark);">🆕 NEW</span>' : ''}
            <h3>${listing.title}</h3>
            <div class="listing-meta">
              <span><i data-lucide="tag" width="14"></i> R${listing.price.toLocaleString()}</span>
              <span><i data-lucide="user" width="14"></i> ${listing.seller_name}</span>
              <span><i data-lucide="phone" width="14"></i> ${listing.seller_phone}</span>
              <span><i data-lucide="map-pin" width="14"></i> ${listing.campus}</span>
            </div>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
              Created: ${new Date(listing.created_at).toLocaleString()}
            </p>
          </div>
          
          <div class="listing-actions">
            ${listing.status === 'pending' ? `
              <button class="btn-action btn-approve" onclick="adminPanel.approveListing(${listing.id})">
                <i data-lucide="check" width="14"></i> Approve
              </button>
            ` : ''}
            ${listing.status === 'active' ? `
              <button class="btn-action btn-sold" onclick="adminPanel.markAsSold(${listing.id})">
                <i data-lucide="dollar-sign" width="14"></i> Mark Sold
              </button>
            ` : ''}
            <button class="btn-action btn-view" onclick="window.open('ListingDetails.html?id=${listing.id}', '_blank')">
              <i data-lucide="eye" width="14"></i> View
            </button>
            <button class="btn-action btn-delete" onclick="adminPanel.deleteListing(${listing.id}, '${listing.title}')">
              <i data-lucide="trash-2" width="14"></i> Delete
            </button>
          </div>
        </div>
      `;
    }).join('');
    
    lucide.createIcons();
  }

  async approveListing(id) {
    if (!confirm('Approve this listing?')) return;
    
    try {
      const { error } = await supabaseClient
        .from('listings')
        .update({ status: 'active', verified: true })
        .eq('id', id);
      
      if (error) throw error;
      
      console.log('✅ Listing approved');
      // Realtime will update automatically
      
    } catch (error) {
      console.error('❌ Error:', error);
      alert('Failed to approve listing');
    }
  }

  async markAsSold(id) {
    if (!confirm('Mark this listing as sold?')) return;
    
    try {
      const { error } = await supabaseClient
        .from('listings')
        .update({ status: 'sold' })
        .eq('id', id);
      
      if (error) throw error;
      
      console.log('💰 Marked as sold');
      
    } catch (error) {
      console.error('❌ Error:', error);
      alert('Failed to mark as sold');
    }
  }

  async deleteListing(id, title) {
    if (!confirm(`Delete "${title}"?\n\nThis cannot be undone!`)) return;
    
    try {
      const { error } = await supabaseClient
        .from('listings')
        .delete()
        .eq('id', id);
      
      if (error) throw error;
      
      console.log('🗑️ Listing deleted');
      
    } catch (error) {
      console.error('❌ Error:', error);
      alert('Failed to delete listing');
    }
  }

  showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    
    const icon = type === 'success' ? 'check-circle' : type === 'warning' ? 'alert-triangle' : 'info';
    notif.innerHTML = `
      <i data-lucide="${icon}" width="20"></i>
      <span>${message}</span>
    `;
    
    document.body.appendChild(notif);
    lucide.createIcons();
    
    setTimeout(() => {
      notif.style.animation = 'slideIn 0.3s ease reverse';
      setTimeout(() => notif.remove(), 300);
    }, 3000);
  }

  playNotificationSound() {
    try {
      const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZSA0PVanu8LdnHQUuh9Dz2YU2Bhxqv+zplkcODVGm5O+4ZSAEMYrO89GFNwYdcfDr4ZdJDQtPp+XysWUeBjiS1/LNfi0GI33R8tOENAcdcO/r4phJDQxPp+TwxGUhBjqT1/PQfS4GI3/R8tSFNwYdcfDr4plHDAtQp+TwxmUgBDeOzvPVhjYGHG3A7+SaSQ0MTKjl8sZmIAU2jc7z1YU1Bhxwv+zmm0gNC1Gn5O/EZSAFNo/M89CEMwYccPDs4ppIDQtRp+TvvWUfBTiOz/PShjUGG3Dw7OKbSA0LUqjl8b1kHwU3jc3z0oU1Bhtw8OzhmUgNC1Ko5fG+ZSAF');
      audio.volume = 0.3;
      audio.play();
    } catch (e) {
      // Ignore sound errors
    }
  }

  destroy() {
    console.log('🧹 Cleaning up realtime connection...');
    if (this.channel) {
      supabaseClient.removeChannel(this.channel);
    }
  }
}

// ===== LOGIN =====
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const password = document.getElementById('passwordInput').value;
  
  if (password === ADMIN_PASSWORD) {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    sessionStorage.setItem('adminAuth', 'true');
    
    // Initialize realtime admin panel
    window.adminPanel = new RealtimeAdminPanel();
  } else {
    alert('❌ Incorrect password');
  }
});

// Check if already logged in
if (sessionStorage.getItem('adminAuth') === 'true') {
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  window.adminPanel = new RealtimeAdminPanel();
}

// ===== FILTER FUNCTION =====
function filterListings(filter) {
  currentFilter = filter;
  
  // Update active button
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  if (window.adminPanel) {
    window.adminPanel.displayListings();
  }
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (window.adminPanel) {
    window.adminPanel.destroy();
  }
});

// Add spin animation
const style = document.createElement('style');
style.textContent = `
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
`;
document.head.appendChild(style);
</script>

</body>
</html>

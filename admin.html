<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - CampusMarket DUT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --primary: #6366f1;
  --accent: #06d6a0;
  --bg-dark: #0f172a;
  --bg-card: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --border: #334155;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
}

.admin-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

header {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 30px;
  border: 1px solid var(--border);
}

h1 {
  font-size: 2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.stat-value {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.stat-pending { color: var(--warning); }
.stat-active { color: var(--success); }
.stat-sold { color: var(--text-secondary); }

.filters {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover {
  border-color: var(--primary);
  color: var(--text-primary);
}

.filter-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.listings-grid {
  display: grid;
  gap: 16px;
}

.listing-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 20px;
  align-items: start;
}

.listing-image {
  width: 100px;
  height: 100px;
  border-radius: 8px;
  object-fit: cover;
  background: rgba(99,102,241,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}

.listing-info h3 {
  font-size: 1.2rem;
  margin-bottom: 8px;
}

.listing-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.listing-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.listing-description {
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
}

.listing-actions {
  display: flex;
  gap: 8px;
  flex-direction: column;
}

.btn {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}

.btn-approve {
  background: var(--success);
  color: white;
}

.btn-approve:hover {
  background: #16a34a;
}

.btn-reject {
  background: var(--danger);
  color: white;
}

.btn-reject:hover {
  background: #dc2626;
}

.btn-view {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-primary);
}

.btn-view:hover {
  background: rgba(255,255,255,0.05);
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-pending {
  background: rgba(245,158,11,0.2);
  color: var(--warning);
}

.badge-active {
  background: rgba(34,197,94,0.2);
  color: var(--success);
}

.badge-verified {
  background: rgba(6,214,160,0.2);
  color: var(--accent);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}

@media (max-width: 768px) {
  .listing-card {
    grid-template-columns: 1fr;
  }
  
  .listing-actions {
    flex-direction: row;
  }
}
</style>
</head>
<body>

<div class="admin-container">
  <header>
    <h1><i data-lucide="shield-check"></i> Admin Panel</h1>
    <p style="color: var(--text-secondary);">Manage and verify CampusMarket listings</p>
  </header>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value stat-pending" id="statPending">0</div>
      <div class="stat-label">Pending Review</div>
    </div>
    <div class="stat-card">
      <div class="stat-value stat-active" id="statActive">0</div>
      <div class="stat-label">Active Listings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value stat-sold" id="statSold">0</div>
      <div class="stat-label">Sold Items</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">Total Listings</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="filterListings('all')">
      All Listings
    </button>
    <button class="filter-btn" data-filter="pending" onclick="filterListings('pending')">
      Pending Review
    </button>
    <button class="filter-btn" data-filter="active" onclick="filterListings('active')">
      Active
    </button>
    <button class="filter-btn" data-filter="sold" onclick="filterListings('sold')">
      Sold
    </button>
  </div>

  <!-- Listings -->
  <div class="listings-grid" id="listingsGrid">
    <div class="empty-state">
      <i data-lucide="loader"></i>
      <p>Loading listings...</p>
    </div>
  </div>
</div>

<!-- Add this at the top of your admin panel, right after the password section -->
<div style="background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
  <div>
    <h3 style="margin: 0 0 8px 0; color: var(--accent);">
      <i data-lucide="activity"></i> Live Admin Panel
    </h3>
    <p style="margin: 0; color: var(--text-secondary); font-size: 0.9rem;">
      Last refreshed: <span id="lastRefreshTime">Just now</span> • 
      <span id="pendingCountDisplay">0</span> pending
    </p>
  </div>
  <div style="display: flex; gap: 12px;">
    <button onclick="forceRefreshNow()" style="padding: 10px 20px; background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
      <i data-lucide="refresh-cw" id="refreshIcon" width="18"></i>
      Refresh Now
    </button>
    <button onclick="toggleAutoRefresh()" id="autoRefreshBtn" style="padding: 10px 20px; background: var(--bg-dark); border: 1px solid var(--accent); border-radius: 8px; color: var(--accent); font-weight: 600; cursor: pointer;">
      Auto: ON
    </button>
  </div>
</div>

  
<script>
lucide.createIcons();

let ALL_LISTINGS = [];
let currentFilter = 'all';

// Password protection
const ADMIN_PASSWORD = '22490622CM_adminsOnly!'; // CHANGE THIS!

function checkAuth() {
  const saved = sessionStorage.getItem('admin_auth');
  if (saved === ADMIN_PASSWORD) return true;
  
  const password = prompt('Enter admin password:');
  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', password);
    return true;
  }
  
  alert('❌ Access denied');
  window.location.href = 'index.html';
  return false;
}


// ===== AGGRESSIVE CACHE BUSTING & AUTO REFRESH =====
let autoRefreshEnabled = true;
let autoRefreshInterval = null;

// Force immediate refresh with cache clearing
async function forceRefreshNow() {
  console.log('🔄 FORCE REFRESH at', new Date().toLocaleTimeString());
  
  // Spin the icon
  const icon = document.getElementById('refreshIcon');
  icon.style.animation = 'spin 0.5s linear infinite';
  
  // Clear browser cache
  if ('caches' in window) {
    const cacheNames = await caches.keys();
    await Promise.all(cacheNames.map(name => caches.delete(name)));
    console.log('🗑️ Cleared browser cache');
  }
  
  // Fetch with cache-busting timestamp
  await fetchListingsWithCacheBust();
  
  // Update timestamp
  document.getElementById('lastRefreshTime').textContent = new Date().toLocaleTimeString();
  
  // Stop spinning
  setTimeout(() => {
    icon.style.animation = '';
  }, 500);
}

// Fetch listings with aggressive cache busting
async function fetchListingsWithCacheBust() {
  try {
    console.log('📡 Fetching listings with cache bust...');
    
    // Add random query param to bust cache
    const timestamp = Date.now();
    
    const { data, error } = await supabaseClient
      .from('listings')
      .select('*')
      .order('created_at', { ascending: false });
    
    if (error) {
      console.error('❌ Fetch error:', error);
      throw error;
    }
    
    console.log(`✅ Fetched ${data.length} listings at ${new Date().toLocaleTimeString()}`);
    
    if (data.length > 0) {
      console.log('📅 Newest listing:', data[0].title, 'created at', data[0].created_at);
    }
    
    // Count pending
    const pendingCount = data.filter(l => l.status === 'pending').length;
    document.getElementById('pendingCountDisplay').textContent = pendingCount;
    
    // Update document title with pending count
    document.title = pendingCount > 0 ? `(${pendingCount}) Admin Panel` : 'Admin Panel';
    
    // Store in global variable (make sure your existing code uses this)
    allListings = data || [];
    
    // Re-render (call your existing render function)
    renderListings();
    updateStats();
    
    return data;
    
  } catch (err) {
    console.error('💥 Failed to fetch:', err);
    alert('Failed to refresh. Check console for details.');
  }
}

// Toggle auto-refresh
function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  const btn = document.getElementById('autoRefreshBtn');
  
  if (autoRefreshEnabled) {
    btn.textContent = 'Auto: ON';
    btn.style.background = 'var(--bg-dark)';
    btn.style.border = '1px solid var(--accent)';
    btn.style.color = 'var(--accent)';
    startAutoRefresh();
  } else {
    btn.textContent = 'Auto: OFF';
    btn.style.background = 'var(--bg-dark)';
    btn.style.border = '1px solid var(--text-secondary)';
    btn.style.color = 'var(--text-secondary)';
    stopAutoRefresh();
  }
}

// Start auto-refresh (every 15 seconds)
function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  
  autoRefreshInterval = setInterval(() => {
    if (autoRefreshEnabled) {
      console.log('⏰ Auto-refresh triggered');
      fetchListingsWithCacheBust();
      document.getElementById('lastRefreshTime').textContent = new Date().toLocaleTimeString();
    }
  }, 15000); // Every 15 seconds
  
  console.log('✅ Auto-refresh started (every 15s)');
}

function stopAutoRefresh() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
    console.log('❌ Auto-refresh stopped');
  }
}

// Add spin animation
const adminStyle = document.createElement('style');
adminStyle.textContent = `
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
`;
document.head.appendChild(adminStyle);

// Start auto-refresh on page load
startAutoRefresh();

// Initial fetch
forceRefreshNow();

// Also refresh when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && autoRefreshEnabled) {
    console.log('👁️ Tab visible - refreshing');
    forceRefreshNow();
  }
});
</script>
</body>
</html>
